/* ============================ DATA LAYER ============================ */
const STORAGE_KEY = "moveeasy_data";

const todayISO = () => new Date().toISOString().slice(0, 10);
const addDays = (n) => { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); };
const uid = () => Math.random().toString(36).slice(2, 10);

const SAMPLE = {
  moveDate: "",
  totalBudget: 0,
  darkMode: false,
  items: [],

  moveDayChecklist: null,
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(SAMPLE));
    return { ...JSON.parse(JSON.stringify(SAMPLE)), ...JSON.parse(raw) };
  } catch (e) { return JSON.parse(JSON.stringify(SAMPLE)); }
}

/* ============================ TOAST ============================ */
const ToastCtx = createContext(null);
const useToast = () => useContext(ToastCtx);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = (msg, type = "success") => {
    const id = uid();
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3000);
  };
  const colors = { success: "bg-secondary", error: "bg-red-500", info: "bg-primary" };
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 no-print">
        {toasts.map((t) => (
          <div key={t.id} className={`${colors[t.type]} text-white px-4 py-3 rounded-xl shadow-lg animate-slideIn flex items-center gap-2 max-w-xs`}>
            <Icon d={Icons.checklist} className="w-4 h-4 shrink-0" />
            <span className="text-sm font-medium">{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

/* ============================ UI PRIMITIVES ============================ */
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 no-print">
      <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={onClose}></div>
      <div className="relative bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-pop">
        <div className="flex items-center justify-between p-5 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white dark:bg-slate-900 rounded-t-2xl">
          <h3 className="font-bold text-lg text-slate-800 dark:text-slate-100">{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500"><Icon d={Icons.close} className="w-5 h-5" /></button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

const Field = ({ label, children }) => (

);

const TextInput = (p) => <input {...p} className={inputCls} />;
const Select = ({ options, ...p }) => <select {...p} className={inputCls}>{options.map((o) => <option key={o} value={o}>{o}</option>)}</select>;

function Btn({ children, variant = "primary", className = "", ...p }) {
  const v = {
    primary: "bg-primary hover:bg-blue-600 text-white",
    secondary: "bg-secondary hover:bg-emerald-600 text-white",
    ghost: "bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200",
    danger: "bg-red-500 hover:bg-red-600 text-white",
  };
  return <button {...p} className={`px-4 py-2 rounded-lg font-medium text-sm transition flex items-center justify-center gap-2 ${v[variant]} ${className}`}>{children}</button>;
}

function Card({ title, value, sub, color = "primary", icon }) {
  const ring = { primary: "text-primary bg-primary/10", secondary: "text-secondary bg-secondary/10", red: "text-red-500 bg-red-500/10", orange: "text-orange-500 bg-orange-500/10", purple: "text-purple-500 bg-purple-500/10" };
  return (
    <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 animate-fadeIn print-block">
      <div className="flex items-start justify-between">

          <p className="text-2xl font-bold text-slate-800 dark:text-slate-100 mt-1">{value}</p>
          {sub && <p className="text-xs text-slate-400 mt-1">{sub}</p>}
        </div>
        {icon && <div className={`p-2.5 rounded-xl ${ring[color]}`}><Icon d={icon} className="w-5 h-5" /></div>}
      </div>
    </div>
  );
}

function Progress({ value, color = "bg-primary" }) {
  return (
    <div className="w-full h-3 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">

  <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div>
      <h1 className="text-2xl font-bold text-slate-800 dark:text-slate-100">{title}</h1>

);

function useConfirm() {

/* ---- DASHBOARD ---- */
function Dashboard({ data, setData }) {
  const packed = data.items.filter((i) => i.packed).length;
  const total = data.items.length;
  const pct = total ? Math.round((packed / total) * 100) : 0;
  const used = data.expenses.reduce((s, e) => s + Number(e.amount), 0);
  const remaining = data.totalBudget - used;
  const daysLeft = daysBetween(data.moveDate);

  const upcoming = [...data.tasks].filter((t) => t.status !== "Selesai").sort((a, b) => new Date(a.deadline) - new Date(b.deadline)).slice(0, 3);

  const catData = CATEGORIES.map((c) => ({ name: c.length > 8 ? c.slice(0,7)+"…" : c, full: c, jumlah: data.items.filter((i) => i.category === c).length })).filter((d) => d.jumlah > 0);

  const insights = [];
  if (pct >= 50) insights.push({ t: `${pct}% barang sudah dipacking. Tetap semangat!`, c: "secondary" });
  else insights.push({ t: `Baru ${pct}% barang dipacking. Ayo mulai dari yang prioritas tinggi.`, c: "orange" });
  const highPending = data.items.filter((i) => i.priority === "Sangat Penting" && !i.packed).length;
  if (highPending > 0) insights.push({ t: `Masih ada ${highPending} barang prioritas tinggi belum dipacking.`, c: "red" });
  if (remaining < 0) insights.push({ t: `Budget over Rp ${Math.abs(remaining).toLocaleString("id-ID")}! Cek pengeluaran.`, c: "red" });
  else insights.push({ t: `Sisa budget ${rupiah(remaining)} dari total ${rupiah(data.totalBudget)}.`, c: "primary" });
  if (daysLeft !== null && daysLeft <= 7 && daysLeft >= 0) insights.push({ t: `Tinggal ${daysLeft} hari menuju pindahan. Pastikan semua siap!`, c: "orange" });

  const insColor = { secondary: "bg-secondary/10 text-secondary border-secondary/30", orange: "bg-orange-500/10 text-orange-600 border-orange-500/30", red: "bg-red-500/10 text-red-600 border-red-500/30", primary: "bg-primary/10 text-primary border-primary/30" };

  return (
    <div>
      <SectionTitle title="Dashboard" desc="Ringkasan persiapan pindahan kamu" />
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-5">
        <Card title="Total Barang" value={total} icon={Icons.box} color="primary" />
        <Card title="Sudah Packing" value={packed} icon={Icons.checklist} color="secondary" />
        <Card title="Belum Packing" value={total - packed} icon={Icons.priority} color="orange" />
        <Card title="Total Budget" value={rupiah(data.totalBudget)} icon={Icons.wallet} color="primary" />
        <Card title="Budget Terpakai" value={rupiah(used)} icon={Icons.budget} color="orange" />
        <Card title="Sisa Budget" value={rupiah(remaining)} color={remaining < 0 ? "red" : "secondary"} icon={Icons.wallet} />
      </div>

      <div className="grid lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 print-block">
          <div className="flex items-center justify-between mb-2">
            <h3 className="font-bold text-slate-800 dark:text-slate-100">Progress Packing</h3>
            <span className="text-2xl font-bold text-primary">{pct}%</span>
          </div>
          <Progress value={pct} color="bg-gradient-to-r from-primary to-secondary" />
          <p className="text-xs text-slate-400 mt-2">{packed} dari {total} barang sudah dipacking</p>

          <h3 className="font-bold text-slate-800 dark:text-slate-100 mt-6 mb-3">Barang per Kategori</h3>
          <div style={{ width: "100%", height: 240 }}>
            <ResponsiveContainer>
              <BarChart data={catData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
                <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                <YAxis allowDecimals={false} tick={{ fontSize: 11 }} />
                <Tooltip />
                <Bar dataKey="jumlah" fill="#3B82F6" radius={[6,6,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="flex flex-col gap-5">
          <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 print-block">
            <div className="flex items-center gap-2 mb-3">
              <div className="p-2 rounded-xl bg-orange-500/10 text-orange-500"><Icon d={Icons.clock} className="w-5 h-5"/></div>
              <div>
                <p className="text-sm text-slate-500">Menuju Pindahan</p>
                <p className="text-2xl font-bold text-slate-800 dark:text-slate-100">
                  {!data.moveDate ? "—" : daysLeft === null ? "—" : daysLeft >= 0 ? `${daysLeft} hari` : "Lewat"}
                </p>
              </div>
            </div>
            <p className="text-xs text-slate-400">{!data.moveDate ? "Atur tanggal pindah di Budget Planner" : "Target: " + new Date(data.moveDate).toLocaleDateString("id-ID", { day:'numeric', month:'long', year:'numeric' })}</p>
          </div>

          <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 print-block">
            <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3">Task Terdekat</h3>
            {upcoming.length === 0 ? <p className="text-sm text-slate-400">Semua task selesai!</p> :
              <div className="space-y-2">{upcoming.map((t) => {
                const dl = daysBetween(t.deadline);
                return (
                  <div key={t.id} className="flex items-center justify-between p-2.5 rounded-lg bg-slate-50 dark:bg-slate-800">
                    <span className="text-sm font-medium text-slate-700 dark:text-slate-200">{t.name}</span>
                    <span className={`text-xs font-semibold ${dl === null ? 'text-slate-400' : dl < 0 ? 'text-red-500' : dl < 3 ? 'text-orange-500' : 'text-slate-400'}`}>{dl === null ? '-' : `${dl}h lagi`}</span>
                  </div>
                );
              })}</div>}
          </div>
        </div>
      </div>

      <div className="mt-5 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 print-block">
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3">💡 Smart Insights</h3>
        <div className="grid md:grid-cols-2 gap-3">
          {insights.map((i, idx) => (
            <div key={idx} className={`p-3 rounded-xl border text-sm font-medium ${insColor[i.c]}`}>{i.t}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---- CHECKLIST BARANG ---- */
function Checklist({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterCat, setFilterCat] = useState("Semua");
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("priority");
  const blank = { name: "", category: "Elektronik", qty: 1, priority: "Normal", packed: false };
  const [form, setForm] = useState(blank);

  const prioRank = { "Sangat Penting": 0, "Penting": 1, "Normal": 2, "Tidak Mendesak": 3 };

  const filtered = useMemo(() => {
    let r = data.items.filter((i) => (filterCat === "Semua" || i.category === filterCat) && i.name.toLowerCase().includes(search.toLowerCase()));
    r = [...r].sort((a, b) => sortBy === "name" ? a.name.localeCompare(b.name) : prioRank[a.priority] - prioRank[b.priority]);
    return r;
  }, [data.items, filterCat, search, sortBy]);

  const open = (item) => { setEditing(item); setForm(item || blank); setModal(true); };
  const save = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return toast("Nama barang wajib diisi", "error");
    if (editing) {
      setData({ ...data, items: data.items.map((i) => i.id === editing.id ? { ...form, id: editing.id, qty: Number(form.qty) } : i) });
      toast("Barang diperbarui");
    } else {
      setData({ ...data, items: [...data.items, { ...form, id: uid(), qty: Number(form.qty) }] });
      toast("Barang ditambahkan");
    }
    setModal(false);
  };
  const togglePack = (id) => setData({ ...data, items: data.items.map((i) => i.id === id ? { ...i, packed: !i.packed } : i) });
  const remove = (id) => { if (confirm("Hapus barang ini?")) { setData({ ...data, items: data.items.filter((i) => i.id !== id) }); toast("Barang dihapus", "info"); } };

  const packed = data.items.filter((i) => i.packed).length;
  const pct = data.items.length ? Math.round((packed / data.items.length) * 100) : 0;
  const pieData = CATEGORIES.map((c) => ({ name: c, value: data.items.filter((i) => i.category === c).length })).filter((d) => d.value > 0);

  return (
    <div>
      <SectionTitle title="Checklist Barang" desc="Kelola daftar barang yang akan dipindahkan"
        action={<Btn onClick={() => open(null)}><Icon d={Icons.plus} className="w-4 h-4"/>Tambah Barang</Btn>} />

      <div className="grid md:grid-cols-3 gap-4 mb-5">
        <div className="md:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <div className="flex items-center justify-between mb-2"><span className="font-medium text-slate-700 dark:text-slate-200">Progress Packing</span><span className="font-bold text-primary">{pct}%</span></div>
          <Progress value={pct} color="bg-secondary" />
        </div>
        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-around text-center">
          <div><p className="text-2xl font-bold text-secondary">{packed}</p><p className="text-xs text-slate-400">Packed</p></div>
          <div><p className="text-2xl font-bold text-orange-500">{data.items.length - packed}</p><p className="text-xs text-slate-400">Belum</p></div>
        </div>
      </div>

      <div className="grid lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <div className="flex flex-wrap gap-2 mb-4">
            <input placeholder="Cari barang…" value={search} onChange={(e) => setSearch(e.target.value)} className={inputCls + " flex-1 min-w-[140px]"} />
            <select value={filterCat} onChange={(e) => setFilterCat(e.target.value)} className={inputCls + " w-auto"}>{["Semua", ...CATEGORIES].map((c) => <option key={c}>{c}</option>)}</select>
            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className={inputCls + " w-auto"}><option value="priority">Sort: Prioritas</option><option value="name">Sort: Nama</option></select>
          </div>
          {filtered.length === 0 ? <EmptyState msg="Belum ada barang. Tambahkan barang pertamamu!" /> :
            <div className="space-y-2">{filtered.map((i) => {
              const ps = PRIORITY_STYLE[i.priority];
              return (
                <div key={i.id} className="flex items-center gap-3 p-3 rounded-xl border border-slate-100 dark:border-slate-800 hover:shadow-sm transition">
                  <input type="checkbox" checked={i.packed} onChange={() => togglePack(i.id)} className="w-5 h-5 rounded accent-secondary cursor-pointer" />
                  <div className="flex-1 min-w-0">
                    <p className={`font-medium text-slate-800 dark:text-slate-100 truncate ${i.packed ? 'line-through text-slate-400' : ''}`}>{i.name}</p>
                    <p className="text-xs text-slate-400">{i.category} · {i.qty} pcs</p>

                  <span className={`hidden sm:flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full ${ps.bg} ${ps.text}`}><span className={`w-1.5 h-1.5 rounded-full ${ps.dot}`}></span>{i.priority}</span>
                  <button onClick={() => open(i)} className="p-1.5 text-slate-400 hover:text-primary"><Icon d={Icons.edit} className="w-4 h-4"/></button>
                  <button onClick={() => remove(i.id)} className="p-1.5 text-slate-400 hover:text-red-500"><Icon d={Icons.trash} className="w-4 h-4"/></button>
                </div>

            })}</div>}
        </div>

        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">Distribusi Kategori</h3>
          {pieData.length === 0 ? <EmptyState msg="Belum ada data" /> :
            <div style={{ width: "100%", height: 260 }}>
              <ResponsiveContainer>
                <PieChart>
                  <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label={(e) => e.value}>
                    {pieData.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                  </Pie>
                  <Tooltip /><Legend wrapperStyle={{ fontSize: 11 }} />
                </PieChart>
              </ResponsiveContainer>
            </div>}

      </div>

      <Modal open={modal} onClose={() => setModal(false)} title={editing ? "Edit Barang" : "Tambah Barang"}>
        <form onSubmit={save}>
          <Field label="Nama Barang"><TextInput value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="cth: Lemari Pakaian" /></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Kategori"><Select options={CATEGORIES} value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })} /></Field>
            <Field label="Jumlah"><TextInput type="number" min="1" value={form.qty} onChange={(e) => setForm({ ...form, qty: e.target.value })} /></Field>
          </div>
          <Field label="Prioritas"><Select options={PRIORITIES} value={form.priority} onChange={(e) => setForm({ ...form, priority: e.target.value })} /></Field>
          <label className="flex items-center gap-2 mb-4 cursor-pointer">
            <input type="checkbox" checked={form.packed} onChange={(e) => setForm({ ...form, packed: e.target.checked })} className="w-5 h-5 rounded accent-secondary" />
            <span className="text-sm text-slate-600 dark:text-slate-300">Sudah dipacking</span>
          </label>
          <div className="flex gap-2 justify-end"><Btn type="button" variant="ghost" onClick={() => setModal(false)}>Batal</Btn><Btn type="submit">Simpan</Btn></div>
        </form>
      </Modal>
    </div>
  );
}

/* ---- TIMELINE ---- */
function Timeline({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const blank = { name: "", deadline: todayISO(), status: "Belum", note: "" };
  const [form, setForm] = useState(blank);

  const sorted = [...data.tasks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  const done = data.tasks.filter((t) => t.status === "Selesai").length;
  const pct = data.tasks.length ? Math.round((done / data.tasks.length) * 100) : 0;

  const open = (t) => { setEditing(t); setForm(t || blank); setModal(true); };
  const save = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return toast("Nama task wajib diisi", "error");
    if (editing) { setData({ ...data, tasks: data.tasks.map((t) => t.id === editing.id ? { ...form, id: editing.id } : t) }); toast("Task diperbarui"); }
    else { setData({ ...data, tasks: [...data.tasks, { ...form, id: uid() }] }); toast("Task ditambahkan"); }
    setModal(false);
  };
  const remove = (id) => { if (confirm("Hapus task ini?")) { setData({ ...data, tasks: data.tasks.filter((t) => t.id !== id) }); toast("Task dihapus", "info"); } };
  const cycle = (t) => { const next = STATUS_OPTS[(STATUS_OPTS.indexOf(t.status) + 1) % 3]; setData({ ...data, tasks: data.tasks.map((x) => x.id === t.id ? { ...x, status: next } : x) }); };

  const statusColor = { "Belum": "bg-slate-300 dark:bg-slate-600", "Sedang": "bg-orange-400", "Selesai": "bg-secondary" };
  const statusBadge = { "Belum": "bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300", "Sedang": "bg-orange-100 text-orange-600 dark:bg-orange-900/40 dark:text-orange-300", "Selesai": "bg-emerald-100 text-secondary dark:bg-emerald-900/40" };

  const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const tasksByDate = {};
  data.tasks.forEach((t) => { const d = new Date(t.deadline); if (d.getFullYear() === y && d.getMonth() === m) (tasksByDate[d.getDate()] = tasksByDate[d.getDate()] || []).push(t); });

  return (
    <div>
      <SectionTitle title="Timeline Pindahan" desc="Atur tahapan & deadline persiapan"
        action={<Btn onClick={() => open(null)}><Icon d={Icons.plus} className="w-4 h-4"/>Tambah Task</Btn>} />

      <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 mb-5">
        <div className="flex items-center justify-between mb-2"><span className="font-medium text-slate-700 dark:text-slate-200">Progress Timeline</span><span className="font-bold text-primary">{pct}%</span></div>
        <Progress value={pct} color="bg-primary" />
      </div>

      <div className="grid lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          {sorted.length === 0 ? <EmptyState msg="Belum ada task" /> :
            <div className="relative pl-8">
              <div className="absolute left-3 top-2 bottom-2 w-0.5 bg-slate-200 dark:bg-slate-700"></div>
              {sorted.map((t) => {
                const dl = daysBetween(t.deadline);
                const warn = t.status !== "Selesai" ? (dl === null ? 'text-slate-400' : dl < 0 ? 'text-red-500' : dl < 3 ? 'text-orange-500' : 'text-slate-400') : 'text-slate-400';
                return (
                  <div key={t.id} className="relative mb-5 last:mb-0 animate-fadeIn">
                    <div className={`absolute -left-[26px] top-1 w-4 h-4 rounded-full border-2 border-white dark:border-slate-900 ${statusColor[t.status]}`}></div>
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <p className="font-semibold text-slate-800 dark:text-slate-100">{t.name}</p>
                          <button onClick={() => cycle(t)} className={`text-xs font-medium px-2 py-0.5 rounded-full ${statusBadge[t.status]}`}>{t.status}</button>
                        </div>
                        <p className={`text-xs mt-0.5 font-medium ${warn}`}>{new Date(t.deadline).toLocaleDateString("id-ID", { day:'numeric', month:'short' })} · {dl === null ? '-' : `${dl} hari lagi`}</p>
                        {t.note && <p className="text-xs text-slate-400 mt-1">{t.note}</p>}
                      </div>
                      <div className="flex gap-1">
                        <button onClick={() => open(t)} className="p-1.5 text-slate-400 hover:text-primary"><Icon d={Icons.edit} className="w-4 h-4"/></button>
                        <button onClick={() => remove(t.id)} className="p-1.5 text-slate-400 hover:text-red-500"><Icon d={Icons.trash} className="w-4 h-4"/></button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>}
        </div>

        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3 capitalize">{now.toLocaleDateString("id-ID", { month:'long', year:'numeric' })}</h3>
          <div className="grid grid-cols-7 gap-1 text-center text-xs">
            {["M","S","S","R","K","J","S"].map((d, i) => <div key={i} className="text-slate-400 font-medium py-1">{d}</div>)}
            {Array(firstDay).fill(0).map((_, i) => <div key={"e"+i}></div>)}
            {Array(daysInMonth).fill(0).map((_, i) => {
              const day = i + 1; const has = tasksByDate[day]; const isToday = day === now.getDate();
              return (
                <div key={day} className={`relative py-1.5 rounded-lg ${isToday ? 'bg-primary text-white font-bold' : has ? 'bg-secondary/15 text-secondary font-semibold' : 'text-slate-600 dark:text-slate-300'}`} title={has ? has.map((t)=>t.name).join(", ") : ""}>
                  {day}{has && !isToday && <span className="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-secondary"></span>}
                </div>
              );
            })}
          </div>
          <div className="mt-3 space-y-1 text-xs text-slate-500">
            {Object.keys(tasksByDate).length === 0 ? <p className="text-slate-400">Tidak ada task bulan ini</p> :
              Object.entries(tasksByDate).map(([d, ts]) => <p key={d}>📌 {d}: {ts.map((t) => t.name).join(", ")}</p>)}
          </div>
        </div>
      </div>

      <Modal open={modal} onClose={() => setModal(false)} title={editing ? "Edit Task" : "Tambah Task"}>
        <form onSubmit={save}>
          <Field label="Nama Task"><TextInput value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} /></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Deadline"><TextInput type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} /></Field>
            <Field label="Status"><Select options={STATUS_OPTS} value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} /></Field>
          </div>
          <Field label="Catatan"><TextInput value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} /></Field>
          <div className="flex gap-2 justify-end"><Btn type="button" variant="ghost" onClick={() => setModal(false)}>Batal</Btn><Btn type="submit">Simpan</Btn></div>
        </form>
      </Modal>
    </div>
  );
}

/* ---- BUDGET ---- */
function Budget({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [budgetModal, setBudgetModal] = useState(false);
  const [budgetInput, setBudgetInput] = useState(data.totalBudget);
  const [moveDateInput, setMoveDateInput] = useState(data.moveDate || "");
  const blank = { name: "", category: "Transportasi", amount: "", date: todayISO(), note: "" };
  const [form, setForm] = useState(blank);

  const used = data.expenses.reduce((s, e) => s + Number(e.amount), 0);
  const remaining = data.totalBudget - used;

  const open = (ex) => { setEditing(ex); setForm(ex || blank); setModal(true); };
  const save = (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.amount) return toast("Lengkapi data pengeluaran", "error");

            <div style={{ width: "100%", height: 260 }}>
              <ResponsiveContainer>
                <PieChart>
                  <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80}>
                    {pieData.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                  </Pie>
                  <Tooltip formatter={(v) => rupiah(v)} /><Legend wrapperStyle={{ fontSize: 11 }} />
                </PieChart>
              </ResponsiveContainer>
            </div>}
        </div>
        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">Pengeluaran per Hari</h3>

                <BarChart data={barData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
                  <XAxis dataKey="name" tick={{ fontSize: 11 }} /><YAxis tick={{ fontSize: 10 }} tickFormatter={(v) => (v/1000)+"k"} />
                  <Tooltip formatter={(v) => rupiah(v)} /><Bar dataKey="jumlah" fill="#10B981" radius={[6,6,0,0]} />

      <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3">Daftar Pengeluaran</h3>
        {data.expenses.length === 0 ? <EmptyState msg="Belum ada pengeluaran" /> :
          <div className="space-y-2">{[...data.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((e) => (
            <div key={e.id} className="flex items-center gap-3 p-3 rounded-xl border border-slate-100 dark:border-slate-800">

              <button onClick={() => open(e)} className="p-1.5 text-slate-400 hover:text-primary"><Icon d={Icons.edit} className="w-4 h-4"/></button>
              <button onClick={() => remove(e.id)} className="p-1.5 text-slate-400 hover:text-red-500"><Icon d={Icons.trash} className="w-4 h-4"/></button>

            <Field label="Jumlah (Rp)"><TextInput type="number" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} /></Field>

  );

                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---- ESTIMASI VOLUME ---- */
function Volume({ data, setData }) {
  const toast = useToast();
  const v = data.volume;
  const set = (k, val) => setData({ ...data, volume: { ...v, [k]: Number(val) || 0 } });
  const vol = v.kardusKecil * 0.03 + v.kardusSedang * 0.06 + v.kardusBesar * 0.12 + v.kasur * 1.2 + v.lemari * 0.9 + v.meja * 0.4 + v.sofa * 1.0 + v.elektronikBesar * 0.3;
  let rec, icon, cost;
  if (vol < 1) { rec = "Motor / Ojek"; icon = "🏍️"; cost = "Rp 50.000 - 150.000"; }
  else if (vol < 3) { rec = "Mobil"; icon = "🚗"; cost = "Rp 200.000 - 400.000"; }
  else if (vol < 6) { rec = "Pickup"; icon = "🛻"; cost = "Rp 400.000 - 700.000"; }
  else if (vol < 15) { rec = "Truk Kecil"; icon = "🚚"; cost = "Rp 700.000 - 1.500.000"; }
  else { rec = "Truk Besar"; icon = "🚛"; cost = "Rp 1.500.000 - 3.500.000"; }
  const gaugePct = Math.min(100, (vol / 20) * 100);

  const fields = [
    ["kardusKecil", "Kardus Kecil"], ["kardusSedang", "Kardus Sedang"], ["kardusBesar", "Kardus Besar"],
    ["kasur", "Kasur"], ["lemari", "Lemari"], ["meja", "Meja"], ["sofa", "Sofa"], ["elektronikBesar", "Elektronik Besar"],
  ];

  return (
    <div>
      <SectionTitle title="Estimasi Volume" desc="Hitung volume barang & rekomendasi kendaraan" />
      <div className="grid lg:grid-cols-2 gap-5">
        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4">Input Barang</h3>
          <div className="grid grid-cols-2 gap-3">
            {fields.map(([k, l]) => (
              <Field key={k} label={l}><TextInput type="number" min="0" value={v[k]} onChange={(e) => set(k, e.target.value)} /></Field>
            ))}
          </div>
          <Btn variant="secondary" onClick={() => toast("Estimasi diperbarui")} className="w-full mt-2">Perbarui Estimasi</Btn>
        </div>

        <div className="space-y-5">
          <div className="bg-gradient-to-br from-primary to-blue-600 rounded-2xl p-6 shadow-sm text-white text-center">
            <p className="text-sm opacity-90">Estimasi Volume Total</p>
            <p className="text-5xl font-bold mt-2">{vol.toFixed(2)}<span className="text-2xl"> m³</span></p>
            <div className="mt-4 w-full h-3 bg-white/30 rounded-full overflow-hidden">
              <div className="h-full bg-white rounded-full transition-all duration-700" style={{ width: `${gaugePct}%` }}></div>
            </div>
            <p className="text-xs opacity-80 mt-1">0 m³ ──────────── 20 m³+</p>
          </div>
          <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 text-center">
            <p className="text-sm text-slate-500">Rekomendasi Kendaraan</p>
            <p className="text-6xl my-3">{icon}</p>
            <p className="text-2xl font-bold text-slate-800 dark:text-slate-100">{rec}</p>
            <div className="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-secondary/10 text-secondary font-semibold"><Icon d={Icons.wallet} className="w-4 h-4"/>{cost}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

const KIBLAT_KEY = "moveeasy_kiblat";
function RoomPlanner({ data, setData }) {

  const setKiblatDir = (dir) => {
    setKiblat(dir);

    "Timur": "right-1 top-1/2 -translate-y-1/2",

    const key = `${r}-${c}`;
    if (layout[key]) {
      const nl = { ...layout }; delete nl[key]; setLayout(nl);

      setLayout({ ...layout, [key]: selected });

  return (
    <div>

      <div className="grid lg:grid-cols-4 gap-5">

          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-3">Pilih Furniture</h3>

                <span className="w-6 h-6 rounded" style={{ background: f.color }}></span>
                <span className="text-sm font-medium text-slate-700 dark:text-slate-200">{name}</span>

            <div className="flex items-center gap-2 mb-2">
              <Icon d={Icons.compass} className="w-4 h-4 text-emerald-600 dark:text-emerald-400" />
              <h3 className="font-bold text-emerald-800 dark:text-emerald-300 text-sm">Penanda Arah Kiblat</h3>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {KIBLAT_OPTS.map((d) => (
                <button key={d} onClick={() => setKiblatDir(kiblat === d ? "" : d)} className={`text-sm font-medium px-3 py-2 rounded-lg border transition ${kiblat === d ? 'bg-emerald-500 text-white border-emerald-500' : 'border-emerald-200 dark:border-emerald-800 text-slate-600 dark:text-slate-300 hover:bg-emerald-50 dark:hover:bg-emerald-900/20'}`}>
                  {kiblat === d ? '🕋 ' : ''}{d}

              ))}
            </div>
            <p className="text-xs text-emerald-700 dark:text-emerald-400 italic mt-3">Posisikan musholla menghadap ke arah kiblat.</p>
          </div>
        </div>

        <div className="lg:col-span-3 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 overflow-x-auto">
          <div className="relative inline-block mx-auto">
            {kiblat && (
              <div className={`absolute z-10 flex flex-col items-center text-emerald-600 dark:text-emerald-400 ${kiblatPos[kiblat]}`} title={`Arah Kiblat: ${kiblat}`}>
                <Icon d={Icons.arrowRight} className={`w-5 h-5 ${kiblatRotate[kiblat]}`} />

/* ---- MOVE DAY CHECKLIST ---- */
const DEFAULT_MOVEDAY = () => {
  const make = (phase, names) => names.map((n) => ({ id: uid(), phase, name: n, status: "Belum", time: "" }));
  return [
    ...make("Sebelum Berangkat", ["Cabut semua peralatan listrik", "Foto meteran listrik & air", "Cek seluruh ruangan", "Ambil semua dokumen penting", "Kunci semua pintu & jendela", "Foto kondisi rumah lama"]),
    ...make("Saat Pindahan", ["Cek semua kardus sudah dimuat", "Koordinasi dengan tim angkut", "Foto bukti kondisi barang sebelum dimuat"]),
    ...make("Setelah Sampai", ["Foto meteran listrik & air rumah baru", "Cek kondisi semua barang", "Foto kondisi rumah baru"]),
  ];
};
function MoveDay({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const list = data.moveDayChecklist || DEFAULT_MOVEDAY();
  useEffect(() => { if (!data.moveDayChecklist) setData({ ...data, moveDayChecklist: list }); }, []);
  const [custom, setCustom] = useState("");
  const [phase, setPhase] = useState("Sebelum Berangkat");

  const update = (nl) => setData({ ...data, moveDayChecklist: nl });
  const cycle = (id) => update(list.map((i) => {
    if (i.id !== id) return i;
    const next = STATUS_OPTS[(STATUS_OPTS.indexOf(i.status) + 1) % 3];
    return { ...i, status: next, time: next === "Selesai" ? new Date().toLocaleTimeString("id-ID", { hour:'2-digit', minute:'2-digit' }) : "" };
  }));
  const add = (e) => { e.preventDefault(); if (!custom.trim()) return; update([...list, { id: uid(), phase, name: custom, status: "Belum", time: "" }]); setCustom(""); toast("Item ditambahkan"); };
  const remove = (id) => { if (confirm("Hapus item?")) { update(list.filter((i) => i.id !== id)); toast("Dihapus", "info"); } };

  const done = list.filter((i) => i.status === "Selesai").length;
  const pct = list.length ? Math.round((done / list.length) * 100) : 0;
  const phases = ["Sebelum Berangkat", "Saat Pindahan", "Setelah Sampai"];
  const statusBadge = { "Belum": "bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300", "Sedang": "bg-orange-100 text-orange-600 dark:bg-orange-900/40 dark:text-orange-300", "Selesai": "bg-emerald-100 text-secondary dark:bg-emerald-900/40" };

  return (
    <div>
      <SectionTitle title="Move Day Checklist" desc="Checklist khusus hari pindahan" />
      <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 mb-5">
        <div className="flex items-center justify-between mb-2"><span className="font-medium text-slate-700 dark:text-slate-200">Progress Hari H</span><span className="font-bold text-primary">{pct}%</span></div>
        <Progress value={pct} color="bg-gradient-to-r from-primary to-secondary" />
      </div>

      <form onSubmit={add} className="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-slate-800 mb-5 flex flex-wrap gap-2">
        <input value={custom} onChange={(e) => setCustom(e.target.value)} placeholder="Tambah item custom…" className={inputCls + " flex-1 min-w-[160px]"} />

                <div key={i.id} className="flex items-start gap-2 p-2.5 rounded-lg bg-slate-50 dark:bg-slate-800">
                  <div className="flex-1 min-w-0">
                    <p className={`text-sm font-medium text-slate-700 dark:text-slate-200 ${i.status === 'Selesai' ? 'line-through text-slate-400' : ''}`}>{i.name}</p>

                  <button onClick={() => cycle(i.id)} className={`text-xs font-medium px-2 py-1 rounded-full ${statusBadge[i.status]}`}>{i.status}</button>

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DoaHijrah({ data, setData }) {

const ADAB_KEY = "moveeasy_adab";

function AdabTetangga({ data, setData }) {
  const toast = useToast();
  const confirm = useConfirm();
  const [state, setState] = useState(() => {
    try {
      const raw = JSON.parse(localStorage.getItem(ADAB_KEY));
      if (raw && Array.isArray(raw.items)) return raw;
    } catch (e) {}
    return { items: ADAB_DEFAULT.map((a) => ({ ...a, done: false })) };
  });
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ adab: "", dalil: "" });

  useEffect(() => {
    try { localStorage.setItem(ADAB_KEY, JSON.stringify(state)); } catch (e) {}
  }, [state]);

  const toggle = (id) => setState((s) => ({ items: s.items.map((i) => i.id === id ? { ...i, done: !i.done } : i) }));
  const remove = (id) => { if (confirm("Hapus adab ini?")) { setState((s) => ({ items: s.items.filter((i) => i.id !== id) })); toast("Adab dihapus", "info"); } };
  const add = (e) => {
    e.preventDefault();
    if (!form.adab.trim()) return toast("Isi nama adab terlebih dahulu", "error");
    setState((s) => ({ items: [...s.items, { id: uid(), adab: form.adab, dalil: form.dalil || "Adab Islam", done: false }] }));
    setForm({ adab: "", dalil: "" });
    setModal(false);
    toast("Adab ditambahkan");
  };

  const done = state.items.filter((i) => i.done).length;
  const pct = state.items.length ? Math.round((done / state.items.length) * 100) : 0;

  return (
    <div>
      <SectionTitle title="Adab Bertetangga" desc="Sunnah & adab Islami menyambut tetangga baru"
        action={<Btn variant="secondary" onClick={() => setModal(true)}><Icon d={Icons.plus} className="w-4 h-4" />Tambah Adab</Btn>} />

      <div className="grid md:grid-cols-3 gap-4 mb-5">
        <div className="md:col-span-2 bg-gradient-to-br from-emerald-50 to-teal-50 dark:from-emerald-900/20 dark:to-teal-900/20 rounded-2xl p-5 border border-emerald-200 dark:border-emerald-800">
          <div className="flex items-center justify-between mb-2"><span className="font-medium text-emerald-800 dark:text-emerald-300">Adab Dilaksanakan</span><span className="font-bold text-emerald-600 dark:text-emerald-400">{pct}%</span></div>
          <Progress value={pct} color="bg-gradient-to-r from-emerald-500 to-teal-500" />
        </div>
        <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-around text-center">
          <div><p className="text-2xl font-bold text-emerald-600 dark:text-emerald-400">{done}</p><p className="text-xs text-slate-400">Selesai</p></div>
          <div><p className="text-2xl font-bold text-orange-500">{state.items.length - done}</p><p className="text-xs text-slate-400">Belum</p></div>
        </div>
      </div>

      <div className="bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
        {state.items.length === 0 ? <EmptyState msg="Belum ada adab. Tambahkan adab pertamamu!" /> :
          <div className="space-y-2">{state.items.map((i) => (
            <div key={i.id} className={`flex items-start gap-3 p-3 rounded-xl border transition ${i.done ? 'border-emerald-300 bg-emerald-50/50 dark:border-emerald-700 dark:bg-emerald-900/20' : 'border-slate-100 dark:border-slate-800'}`}>
              <input type="checkbox" checked={i.done} onChange={() => toggle(i.id)} className="w-5 h-5 mt-0.5 rounded cursor-pointer" style={{ accentColor: "#10B981" }} />
              <div className="flex-1 min-w-0">
                <p className={`font-medium text-slate-800 dark:text-slate-100 ${i.done ? 'line-through text-slate-400' : ''}`}>{i.adab}</p>
                <p className="text-xs text-slate-400 italic mt-0.5">{i.dalil}</p>
              </div>
              <button onClick={() => remove(i.id)} className="p-1.5 text-slate-400 hover:text-red-500 no-print"><Icon d={Icons.trash} className="w-4 h-4" /></button>
            </div>
          ))}</div>}
      </div>

      <Modal open={modal} onClose={() => setModal(false)} title="Tambah Adab">
        <form onSubmit={add}>
          <Field label="Adab"><TextInput value={form.adab} onChange={(e) => setForm({ ...form, adab: e.target.value })} placeholder="cth: Menjenguk tetangga yang sakit" /></Field>
          <Field label="Dalil (opsional)"><TextInput value={form.dalil} onChange={(e) => setForm({ ...form, dalil: e.target.value })} placeholder="cth: HR. Muslim" /></Field>
          <div className="flex gap-2 justify-end"><Btn type="button" variant="ghost" onClick={() => setModal(false)}>Batal</Btn><Btn type="submit" variant="secondary">Simpan</Btn></div>
        </form>
      </Modal>
    </div>
  );
}

/* ============================ ERROR BOUNDARY ============================ */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
          <div className="text-5xl mb-4">⚠️</div>
          <h1 className="text-xl font-bold text-slate-800 dark:text-slate-100">Terjadi Kesalahan</h1>
          <p className="text-sm text-slate-500 mt-2 max-w-md">{String(this.state.error)}</p>
          <button onClick={() => { localStorage.removeItem(STORAGE_KEY); location.reload(); }} className="mt-4 px-4 py-2 bg-primary text-white rounded-lg">Reset Data & Muat Ulang</button>
        </div>
      );
    }
    return this.props.children;
  }
}
